<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Konu02 Operatorler</title>
</head>
<body>
    <h1>Konu02 Operatorler</h1>
    <h2>Aritmetik Operatörler</h2>
    <p>
        Matematiksel işlemler için kullanılır
    </p>

    <script>
        let sayi1 = 10,
            sayi2 = 8;

        console.error("Sayı 1 : " + sayi1 + " - Sayı 2 : " + sayi2);
        console.log("Sayı 1 + sayi 2 = ", sayi1 + sayi2);
        console.log("Sayı 1 + sayi 2 = " + sayi1 + sayi2) //burada string değerle sayısal değeri birleştiriyor
        console.log("Sayı (sayi1 + sayi2) = " + (sayi1 + sayi2)) // birleştirmeyi engellemek için

        console.log("Sayı 1 - sayi 2 = ", sayi1 - sayi2);
        console.log("Sayı 1 * sayi 2 = ", sayi1 * sayi2);
        console.log("Sayı 1 / sayi 2 = ", sayi1 / sayi2);
        console.log("Sayı 1 % sayi 2 = ", sayi1 % sayi2);
    </script>
</body>
</html>
